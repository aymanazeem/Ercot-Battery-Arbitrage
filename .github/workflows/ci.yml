# Continuous integration. Lint and test on every push and pull request.
#
# The whole suite runs on synthetic and fixture data, so it needs no API keys and no network.
# That keeps it fast and repeatable, and proves the whole pipeline still works.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the package and dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

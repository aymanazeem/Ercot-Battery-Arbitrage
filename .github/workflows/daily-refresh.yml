# Daily refresh of the data and results.
#
# This runs once a day on GitHub Actions. It downloads the latest data, rebuilds the
# processed tables, features, forecasts, and backtest, then uploads the processed and results
# tables as a build artifact. It does not commit the data back to the repo.

name: daily-refresh

on:
  schedule:
    # 11:00 UTC daily, after the data the pipeline needs is published
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the package and dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run the daily pipeline
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python -m ercot_bess.api.orchestrator

      - name: Upload the refreshed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ercot-bess-artifacts
          path: |
            data/processed
            data/results
          if-no-files-found: error

# committing the data back to the repo is left off, it would need write permission and a commit step
